# example.secrets.yaml
# Скопируйте этот файл в secrets.yaml и вставьте свои данные

# Основная WiFi сеть
wifi_ssid: "your_wifi_name"
wifi_password: "your_wifi_password"

# Резервная WiFi сеть (опционально)
wifi_ssid2: "backup_wifi_name"
wifi_password2: "backup_wifi_password"

# OTA пароль (не забудьте сменить!)
ota_password: "your_strong_ota_password"

# API ключ (если используете)
api_key: "your_api_key_here"

