# ==================================================
# СЕКРЕТЫ ДЛЯ ESPHome
# ==================================================
# Переименуй этот файл в secrets.yaml и заполни свои данные
# ==================================================

# -------------------- WiFi СЕТИ --------------------
# Основная сеть
wifi_ssid: "название_твоей_wifi_сети"
wifi_password: "пароль_от_wifi"

# Резервная сеть (гостевая или соседская)
wifi_ssid2: "название_резервной_сети"
wifi_password2: "пароль_резервной_сети"

# -------------------- БЕЗОПАСНОСТЬ --------------------
# Пароль для OTA обновлений (не менее 8 символов)
ota_password: "esphome"

# Пароль для точки доступа (если устройство не может подключиться к WiFi)
ap_password: "setup1234"

# Ключ шифрования API для Home Assistant
# Сгенерируй командой: esphome config.yaml --generate-encryption-key
api_key: "твой_ключ_шифрования_api_тут"

# -------------------- ПРИМЕРЫ --------------------
# Пример для сети:
# wifi_ssid: "MyHome_2.4GHz"
# wifi_password: "MySuperSecretPass123"

# Пример для ключа API (должен быть длинной строкой):
# api_key: "12345678901234567890123456789012"
